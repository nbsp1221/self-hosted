name: bifrost

services:
  bifrost:
    image: maximhq/bifrost:latest
    restart: unless-stopped
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "8080"
      APP_DIR: /app/data
      LOG_LEVEL: info
      LOG_STYLE: json
      GOGC: "200"
      GOMEMLIMIT: 900MiB
      BIFROST_ENCRYPTION_KEY: ${BIFROST_ENCRYPTION_KEY}
    expose:
      - "8080"
    volumes:
      - ./data:/app/data
    networks:
      - caddy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

networks:
  caddy-network:
    name: caddy-network
    external: true
