name: monitoring

services:
  prometheus:
    image: prom/prometheus:v3.9.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=20GB
    restart: unless-stopped
    init: true
    expose:
      - "9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    depends_on:
      - node-exporter
      - dcgm-exporter
      - smartctl-exporter
      - cadvisor
      - loki
      - alloy
    networks:
      - monitoring-network

  node-exporter:
    image: prom/node-exporter:v1.10.2
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.systemd
      - --collector.processes
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containerd/.+|run/.+)($|/)
    restart: unless-stopped
    init: true
    # Needed for host systemd D-Bus access on AppArmor-enforced Docker hosts
    security_opt:
      - apparmor:unconfined
    pid: host
    uts: host
    expose:
      - "9100"
    volumes:
      - /:/host:ro,rslave
      - /run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
    networks:
      - monitoring-network

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
    restart: unless-stopped
    init: true
    cap_add:
      - SYS_ADMIN
    gpus: all
    expose:
      - "9400"
    networks:
      - monitoring-network

  smartctl-exporter:
    image: quay.io/prometheuscommunity/smartctl-exporter:v0.14.0
    restart: unless-stopped
    init: true
    privileged: true
    user: root
    expose:
      - "9633"
    networks:
      - monitoring-network

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.53.0
    restart: unless-stopped
    init: true
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - monitoring-network

  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.28.0
    command:
      - --config.file=/config/blackbox.yml
    restart: unless-stopped
    init: true
    expose:
      - "9115"
    volumes:
      - ./blackbox:/config:ro
    networks:
      - monitoring-network
      - caddy-network

  loki:
    image: grafana/loki:3.6.7
    command:
      - -config.file=/etc/loki/config.yml
    restart: unless-stopped
    init: true
    expose:
      - "3100"
    volumes:
      - ./loki:/etc/loki:ro
      - loki-data:/loki
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-health"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  alloy:
    image: grafana/alloy:v1.13.2
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    restart: unless-stopped
    init: true
    expose:
      - "12345"
    volumes:
      - ./alloy:/etc/alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - monitoring-network

  grafana:
    image: grafana/grafana:12.3.3
    restart: unless-stopped
    init: true
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: ${GRAFANA_USERS_ALLOW_SIGN_UP}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: ${GRAFANA_HOME_DASHBOARD_PATH}
    expose:
      - "3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      monitoring-network:
      caddy-network:

networks:
  monitoring-network:
    name: monitoring-network
    driver: bridge
  caddy-network:
    external: true
    name: caddy-network

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  alloy-data:
